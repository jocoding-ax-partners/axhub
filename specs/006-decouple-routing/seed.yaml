goal: Decouple axhub Claude Code plugin routing so non-axhub projects get zero-footprint
  pass-through while explicit axhub invocations always work, by implementing a shared
  routing-decision function gated on project marker (axhub.yaml walk-up), keyword
  detection, and slash invocation modality
task_type: code
brownfield_context:
  project_type: brownfield
  context_references:
  - path: /Users/wongil/Desktop/work/jocoding/axhub
    role: primary
    summary: axhub Claude Code plugin source — hooks, skills, helpers, nl-lexicon
      routing
  - path: specs/004-migrate-existing-apps/contracts/axhub-yaml-schema
    role: reference
    summary: axhub.yaml project marker schema definition
  - path: docs/HOOKS.md
    role: reference
    summary: Hook safety contract and kill switch taxonomy
  - path: docs/plugin-developer-guide.md
    role: reference
    summary: Plugin design reference — auth modes, MCP integration, backend catalog
      API
  - path: docs/adr/0013
    role: reference
    summary: ADR for load-time command injection deprecation (in-body preflight canonical)
  existing_patterns:
  - fail-open hook contract (exit 0 always, hook_safety::is_hook_disabled)
  - in-body preflight Step 0 pattern (CANONICAL_PREFLIGHT_BLOCK in deploy SKILL)
  - nl-lexicon trigger phrases in SKILL description frontmatter (baseline-locked by
    lint:keywords)
  - AskUserQuestion with HMAC consent gate in deploy SKILL
  - session-start.sh eager infra chain (helper download → token-init → warmup → quality-context)
  - axhub-helpers Rust binary for prompt-route/session-start subcommands
  - routing-stats SKILL for routing telemetry
  - once-per-project persistence pattern for grace messages
  - token-file path via axhub-helpers path token-file (~/.config/axhub-plugin/token)
  existing_dependencies:
  - axhub-helpers Rust binary (crates/axhub-helpers)
  - bun test framework (≥498 pass baseline)
  - commit-and-tag-version release toolchain
  - lint:tone and lint:keywords baseline checks
  - skill:doctor pattern validation
  - bunx tsc --noEmit type checking
constraints:
- All hooks (session-start/prompt-route/classify-exit) marker-gated, not deploy only
- Marker = axhub.yaml with cwd→git-root walk-up, fallback filesystem root
- Helper binary download excluded from marker gate (brick prevention)
- Marker gate targets limited to token-init, Gatekeeper warmup, quality-context injection
- Deploy SKILL description trigger phrases baseline-locked (lint:keywords), cannot
  delete
- Auth read = token-file .exists() stat only, must not trigger bootstrap (circular
  dependency)
- Hook layer = systemMessage injection only, no interactive tools
- Disambiguation single owner = deploy preflight (skill layer)
- Foreign target keywords hardcoded in helper binary (vercel/netlify/cloudflare/fly/render/railway)
- Grace warning = once-per-project persistence
- Routing-decision must be single shared function in helper consumed by both hook
  and preflight
- Deploy preflight gate scope only, not expanded to apps/recover/other mutating SKILLs
- Lazy auth failure must show clear error + axhub auth login guidance, never silently
  pass-through
acceptance_criteria:
- Non-marker repo + "배포해" (implicit) → ignore, no axhub routing
- Non-marker repo + "axhub에 배포해" (explicit keyword) → axhub routing works via lazy
  auth bootstrap
- axhub repo + "vercel에 배포해" (foreign keyword) → axhub yields at both hook and preflight
  layers
- axhub repo + "배포해" (implicit + marker) → axhub routing activates
- /deploy or /axhub:deploy slash command → always axhub regardless of marker or keywords
  (rule 0)
- '"axhub" + "vercel" conflict in same prompt → AskUserQuestion disambiguation at
  preflight'
- session-start eager infra (token-init/warmup/quality-context) skipped in non-marker
  projects
- Helper binary auto-download runs unconditionally in all projects
- Lazy auth bootstrap succeeds on explicit invocation in non-marker project
- Lazy auth failure produces actionable error message not silent pass-through
- Grace warning fires once-per-project for authed user with no marker on implicit
  deploy intent
- routing-audit-*.jsonl records decision type (axhub/yield/ignore/ask/explicit) per
  prompt
- routing-stats skill reports non-axhub ignore rate from audit data
- marker×keyword×slash×prompt combination test matrix passes all branches
- Deploy preflight Step 0 blocks axhub deploy when decision is yield/ignore/ask
- Hook and preflight produce identical decision for same input (shared function, no
  drift)
- Marker walk-up error + authed user → fail-open to axhub routing
- Marker walk-up error + unauthed user → fail-open to pass-through
- 'Double surface (grace + preflight) bounded: grace once then preflight only'
ontology_schema:
  name: RoutingDecision
  description: Shared routing decision model that determines whether axhub plugin
    should handle, yield, ignore, or ask about a user prompt based on keyword presence,
    project marker, auth state, and invocation modality
  fields:
  - name: prompt
    type: string
    description: Raw user prompt text for keyword analysis
    required: true
  - name: marker_present
    type: boolean
    description: Whether axhub.yaml found via cwd-to-git-root walk-up
    required: true
  - name: authed
    type: boolean
    description: Whether axhub token-file exists (cheap stat, no bootstrap)
    required: true
  - name: explicit_invocation
    type: boolean
    description: Whether prompt is a slash command (/deploy or /axhub:deploy)
    required: true
  - name: decision
    type: string
    description: Routing outcome enum — axhub, yield, ignore, or ask
    required: true
  - name: foreign_keywords
    type: array
    description: Hardcoded competitor target names (vercel/netlify/cloudflare/fly/render/railway)
    required: true
  - name: axhub_keyword_present
    type: boolean
    description: Whether prompt contains literal 'axhub' string
    required: true
  - name: foreign_keyword_present
    type: boolean
    description: Whether prompt contains any foreign target keyword
    required: true
  - name: grace_shown
    type: boolean
    description: Per-project flag tracking whether migration grace message was displayed
    required: true
  - name: audit_entry
    type: object
    description: Structured log entry recording decision type and inputs per prompt
    required: true
evaluation_principles:
- name: zero-footprint-compliance
  description: Non-axhub projects must have zero axhub session artifacts (no token-init,
    no warmup, no quality-context, no routing nudge)
  weight: 0.25
- name: named-target-wins
  description: Explicit target keyword in prompt always overrides marker-based default
    routing in both hook and preflight layers
  weight: 0.25
- name: composition-consistency
  description: Hook layer and deploy preflight must produce identical routing decision
    for same inputs via shared function
  weight: 0.2
- name: explicit-always-works
  description: Explicit axhub invocations (/deploy, 'axhub' keyword) function regardless
    of marker presence with lazy auth bootstrap
  weight: 0.15
- name: backward-compatibility
  description: Existing axhub.yaml users experience no regression on implicit deploy
    prompts, with grace warning for non-marker users
  weight: 0.1
- name: fail-open-safety
  description: All hooks exit 0 unconditionally; marker check errors fall back auth-conditionally
    without breaking Claude Code session
  weight: 0.05
exit_conditions:
- name: routing-function-implemented
  description: Shared routing-decision function exists in helper binary with 4 inputs
    and priority rules 0-5+err
  criteria: All 6 priority rules produce correct decision for canonical test inputs
- name: hook-integration-complete
  description: prompt-route hook consumes shared function with correct action mapping
    (axhub→neutral, yield→silent, ignore→silent+grace, ask→neutral)
  criteria: Hook produces systemMessage-only output, never interactive tools
- name: preflight-integration-complete
  description: Deploy SKILL preflight Step 0 consumes shared function with correct
    action mapping (axhub→proceed, yield→yield, ignore/ask→disambiguation)
  criteria: Preflight blocks non-axhub decisions before auth/resolve
- name: session-start-gated
  description: session-start eager infra (token-init/warmup/quality-context) conditional
    on marker presence, helper download unconditional
  criteria: Non-marker session produces zero axhub artifacts
- name: test-matrix-passes
  description: marker×keyword×slash×auth combination test matrix covers all priority
    rules plus error paths
  criteria: All branches green including fail-open auth-conditional paths
- name: audit-trail-operational
  description: routing-audit jsonl logging records decision type per prompt, routing-stats
    skill reads and reports
  criteria: Audit entries contain decision enum and all 4 input values
