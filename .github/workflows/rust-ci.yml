name: Rust CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-test:
    name: rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      # PR #99 macOS infra: Swatinem/rust-cache@v2 restore corrupts
      # `~/.cargo/bin/{cargo,rustc}` into `rustup-init` 1.29.0 on Apple Silicon
      # GHA runners. Skip cache restore on macOS — accept slower fresh build over
      # systematic "error: unexpected argument 'test' found / Usage: rustup-init"
      # failure. ubuntu / windows cache 유지.
      - uses: Swatinem/rust-cache@v2
        if: matrix.os != 'macos-latest'
      - run: cargo test --workspace
      - uses: oven-sh/setup-bun@v2
        if: matrix.os == 'ubuntu-latest'
      - uses: taiki-e/install-action@cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
      - name: Coverage gate (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          bun install --frozen-lockfile
          bun run cargo:coverage
      - run: cargo build --workspace --release
      - name: Verify static CRT linkage (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "target/release/axhub-helpers.exe"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $msvcDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $dumpbin = Join-Path $msvcDir.FullName 'bin\Hostx64\x64\dumpbin.exe'
          if (-not (Test-Path $dumpbin)) {
            Write-Error "dumpbin.exe not found at $dumpbin"; exit 1
          }
          $deps = & $dumpbin /dependents $exe 2>&1 | Out-String
          if ($deps -match '(?i)vcruntime140|msvcp140') {
            Write-Error "FAIL: dynamic MSVC CRT linkage detected in $exe — expected +crt-static. Dependencies:`n$deps"
            exit 1
          }
          Write-Output "PASS: static CRT verified for $exe"
