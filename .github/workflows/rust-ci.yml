name: Rust CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust-test:
    name: rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.83.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo build --workspace --release
