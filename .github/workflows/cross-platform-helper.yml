name: cross-platform-helper

# Cross-platform validation for sh/ps1 absorption work (plan/sh-ps1-absorption).
# rust-ci.yml already covers `cargo test --workspace` across 3 OS. This workflow
# focuses on the bun-based integration tests that exercise the shell wrappers
# (hooks/session-start*.sh, hooks/token-freshness-gate.sh) which spawn `bash`
# directly. Windows-latest skips these tests because the wrappers require bash.

on:
  pull_request:
    paths:
      - 'hooks/**'
      - 'bin/**'
      - 'crates/axhub-helpers/src/spawn.rs'
      - 'crates/axhub-helpers/src/autowire.rs'
      - 'crates/axhub-helpers/src/main.rs'
      - 'crates/axhub-helpers/src/hook_safety.rs'
      - 'crates/axhub-helpers/src/orphan_stub.rs'
      - 'tests/hooks-kill-switch.test.ts'
      - 'tests/token-freshness-gate.test.ts'
      - 'tests/install.test.sh'
      - '.github/workflows/cross-platform-helper.yml'
  push:
    branches: [main]
    paths:
      - 'hooks/**'
      - 'bin/**'
      - 'crates/axhub-helpers/src/spawn.rs'
      - 'crates/axhub-helpers/src/autowire.rs'
      - 'crates/axhub-helpers/src/main.rs'
      - 'crates/axhub-helpers/src/hook_safety.rs'
      - 'crates/axhub-helpers/src/orphan_stub.rs'
      - '.github/workflows/cross-platform-helper.yml'

jobs:
  hook-integration:
    name: hook integration ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows-latest 는 bash 부재로 hooks/*.sh spawn 불가. rust-ci.yml 의
        # cargo test 매트릭스가 Windows cfg(windows) 분기 회귀를 catch 해요.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
      # rust-ci.yml 의 macOS rust-cache 회피 패턴 동일 (PR #99).
      - uses: Swatinem/rust-cache@v2
        if: matrix.os != 'macos-latest'
      - name: Build helper for hook integration tests
        # tests/token-freshness-gate.test.ts spawns `bin/axhub-helpers token-gate`
        # directly (sh/ps1-absorption Phase 4 F1). Cargo's default target/debug/
        # path doesn't satisfy that contract — copy + chmod into bin/ so the
        # runtime layout matches what install.sh would have produced.
        run: |
          cargo build --workspace
          mkdir -p bin
          cp target/debug/axhub-helpers bin/axhub-helpers
          chmod +x bin/axhub-helpers
      - uses: oven-sh/setup-bun@v2
      - name: bun install
        run: bun install --frozen-lockfile
      - name: bun test — hook kill switch matrix
        run: bun test tests/hooks-kill-switch.test.ts
      - name: bun test — token freshness gate
        run: bun test tests/token-freshness-gate.test.ts
