name: routing-drift

# Phase 8 sub-task 8.3: routing accuracy + drift CI gate.
#
# PR 마다 routing-affecting file 이 바뀌면 committed baseline fixture 갱신을
# 요구하고, corpus.100 fixture gate 로 accuracy/drift 를 확인해요.
# manual override = PR title 에 [skip-routing-gate] 포함.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  drift-check:
    name: corpus.100 drift gate (≥95% accuracy / ≤5% drift)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip-routing-gate]') }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: Build axhub-helpers (release)
        run: |
          cargo build --release -p axhub-helpers
          mkdir -p bin
          cp target/release/axhub-helpers bin/axhub-helpers

      - name: Check routing fixture freshness
        run: |
          # Force-update the tracking ref (leading '+') and do NOT shallow-fetch:
          # checkout uses fetch-depth:0, so a `--depth=1` fetch introduces a shallow
          # boundary that cannot fast-forward the full-history ref and git rejects it
          # with "[rejected] main -> origin/main (non-fast-forward)" whenever the base
          # branch advanced (e.g. another PR merged) since this PR was branched.
          git fetch origin "+${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          bun scripts/check-routing-fixture-sync.ts --base "origin/${{ github.base_ref }}" --head HEAD

      - name: Run corpus.100 drift gate
        id: drift
        run: bash tests/run-corpus.sh --mode plugin --corpus tests/corpus.100.jsonl --vs claude-native --score
        continue-on-error: true

      - name: Comment on failure
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                'routing-drift gate 실패',
                '',
                'routing-affecting 변경에 baseline fixture 갱신이 없거나, corpus.100 의 docs-only baseline ↔ claude-native baseline drift > 5% 또는 accuracy < 95% 예요.',
                '',
                '대응:',
                '1. `bun run measure:baseline` 으로 fresh docs-only baseline 측정 (docs/baseline-measurement.md 참고)',
                '2. SKILL.md description 갱신 후 재측정',
                '3. 의도된 drift 면 PR title 에 `[skip-routing-gate]` 포함',
                '',
                '자세히는 workflow log 확인.',
              ].join('\n'),
            })

      - name: Fail if drift gate failed
        if: steps.drift.outcome == 'failure'
        run: exit 1

  # Phase 11 fix — audit trail for [skip-routing-gate] manual override.
  # Posts a PR comment so reviewers see the skip explicitly.
  audit-skip:
    name: routing-drift gate skipped (audit trail)
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.title, '[skip-routing-gate]') }}
    steps:
      - name: Comment skip override
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                'routing-drift gate **manually skipped** via `[skip-routing-gate]` PR title flag.',
                '',
                '`bun run measure:baseline` 후 fresh docs-only baseline 갱신 PR 가 후속 필수예요.',
                '리뷰어는 이 skip 사용 의도 확인 후 approve 부탁해요.',
              ].join('\n'),
            })
