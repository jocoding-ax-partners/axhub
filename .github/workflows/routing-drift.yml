name: routing-drift

# Phase 8 sub-task 8.3: routing accuracy + drift CI gate.
#
# PR 마다 routing-affecting file 이 바뀌면 committed baseline fixture 갱신을
# 요구하고, corpus.100 fixture gate 로 accuracy/drift 를 확인해요.
# manual override = PR title 에 [skip-routing-gate] 포함.

on:
  pull_request:
    branches:
      - main

jobs:
  drift-check:
    name: corpus.100 drift gate (≥95% accuracy / ≤5% drift)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip-routing-gate]') }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install bun deps
        run: bun install --frozen-lockfile

      - name: Build axhub-helpers (release)
        run: |
          cargo build --release -p axhub-helpers
          mkdir -p bin
          cp target/release/axhub-helpers bin/axhub-helpers

      - name: Check routing fixture freshness
        run: |
          git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" | bun scripts/check-routing-fixture-sync.ts

      - name: Run corpus.100 drift gate
        id: drift
        run: bash tests/run-corpus.sh --mode plugin --corpus tests/corpus.100.jsonl --vs claude-native --score
        continue-on-error: true

      - name: Comment on failure
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                'routing-drift gate 실패',
                '',
                'routing-affecting 변경에 baseline fixture 갱신이 없거나, corpus.100 의 docs-only baseline ↔ claude-native baseline drift > 5% 또는 accuracy < 95% 예요.',
                '',
                '대응:',
                '1. `bun run measure:baseline` 으로 fresh docs-only baseline 측정 (docs/baseline-measurement.md 참고)',
                '2. SKILL.md description 갱신 후 재측정',
                '3. 의도된 drift 면 PR title 에 `[skip-routing-gate]` 포함',
                '',
                '자세히는 workflow log 확인.',
              ].join('\n'),
            })

      - name: Fail if drift gate failed
        if: steps.drift.outcome == 'failure'
        run: exit 1
