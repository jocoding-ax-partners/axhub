name: claude-cli-e2e

# claude -p subprocess E2E 하네스 CI.
#
# diet 후 matrix 는 단일 T1 케이스(case 19, 한국어 NL deploy 회귀)만 남았어요.
# T1 은 실제 `claude -p` 호출이라 cost burn (~$1.5/run) — 원설계대로 PR-blocking
# 에 두지 않고 nightly + 수동 dispatch 로만 fire 해요.
#
# (이전의 $0 "T2 helper-bin" PR-blocking job 은 Rust helper 바이너리 삭제로
#  T2 케이스가 0개가 됐고 `bun run build`/`smoke`/`test:plugin-e2e` 스크립트도
#  전부 제거돼 제거했어요. 하네스는 fixtures/bin/axhub shim 으로 동작해 Rust
#  toolchain 이 필요 없어요.)

on:
  schedule:
    - cron: "0 17 * * *"  # 02:00 KST nightly
  workflow_dispatch:
    inputs:
      tier:
        description: "Run tier"
        required: false
        default: "nightly"
        type: choice
        options: [t1, nightly]

jobs:
  e2e-nightly:
    name: T1 claude -p E2E (cost-aware)
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version
      - name: Verify ANTHROPIC_API_KEY present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret missing — required for nightly T1 cost burn"
            exit 1
          fi
          echo "::notice::API key present, proceeding with T1 cost burn (~\$1.50/run)"
      - name: Run E2E matrix (claude -p)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TIER="${{ inputs.tier || 'nightly' }}"
          bash tests/e2e/claude-cli/run-matrix.sh --tier "$TIER"
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-cli-e2e-nightly
          path: tests/e2e/claude-cli/output/
          retention-days: 14
