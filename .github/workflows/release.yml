name: release

# On tag push, create a GitHub release whose body is the matching
# CHANGELOG.md section, then notify Slack with the lead narrative paragraph.
# (Rust helper binary build / cosign signing / manifest generation removed —
# the plugin ships as Claude Code skills, no native binaries.)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (for example, v0.1.24)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Create or update GitHub release from CHANGELOG section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "release tag must look like vX.Y.Z, got: $TAG" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; print; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "CHANGELOG section for $VERSION not found — using fallback notes"
            printf 'See CHANGELOG.md for details.\n' > "$NOTES_FILE"
          fi
          echo "--- release notes preview ---"
          head -40 "$NOTES_FILE"
          echo "--- end preview ---"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          fi

      - name: Notify Slack of new release
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

          # Fetch the release body and extract ONLY the lead narrative
          # paragraph — the first non-heading paragraph that follows the
          # `## [version]` line. Everything below (### Added auto-bullets etc.)
          # belongs on the GitHub release page; Slack stays focused on the
          # human "what shipped" summary. Strip CRLF for jq compatibility.
          BODY_RAW="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body -q .body 2>/dev/null | tr -d '\r' || echo '')"
          if [ -z "$BODY_RAW" ]; then
            BODY_TRIMMED="(릴리즈 노트 본문 없음 — GitHub 에서 확인해주세요)"
          else
            BODY_TRIMMED="$(printf '%s' "$BODY_RAW" | awk '
              BEGIN { started = 0 }
              # Skip the version heading line (`## [0.8.0](...) (date)`).
              /^## / { next }
              # Stop at the auto-bullets section ("### Added" etc.) — those
              # are derived from Conventional Commits and noisy in Slack.
              /^### / { exit }
              # Empty line: terminate paragraph once we have content.
              NF == 0 {
                if (started) exit
                next
              }
              # First non-empty body line: print + flag paragraph started.
              { started = 1; print }
            ')"
            if [ -z "$BODY_TRIMMED" ]; then
              BODY_TRIMMED="(릴리즈 노트 narrative 없음 — GitHub 에서 확인해주세요)"
            fi
            # Slack section hard-cap = 3000 chars. Narrative paragraphs are
            # short (~600-1200 chars) but truncate defensively if a future
            # release writes a 3k+ char single paragraph.
            BODY_TRIMMED="$(printf '%s' "$BODY_TRIMMED" | awk '
              { lines[NR] = $0 }
              END {
                cap = 2800
                acc = 0
                for (i = 1; i <= NR; i++) {
                  line = lines[i]
                  if (acc + length(line) + 1 > cap) {
                    print line
                    print "…(잘림 — 전체 본문은 GitHub release 페이지에서)"
                    exit
                  }
                  print line
                  acc += length(line) + 1
                }
              }
            ')"
          fi

          # Convert the narrative paragraph into per-sentence bullets so
          # Slack renders it as a scannable list instead of a wall of text.
          BODY_FILE="$(mktemp)"
          if printf '%s' "$BODY_TRIMMED" | head -1 | grep -qE '^[•\-\*] '; then
            printf '%s' "$BODY_TRIMMED" > "$BODY_FILE"
          else
            printf '• %s' "$BODY_TRIMMED" | sed 's/\. /.\n• /g' > "$BODY_FILE"
          fi

          # Use --rawfile so jq emits proper "\n" JSON escapes; --arg passes
          # literal newline bytes through, which Slack rejects with
          # "control characters must be escaped".
          PAYLOAD=$(jq -nc \
            --arg tag "$TAG" \
            --arg url "$URL" \
            --rawfile body "$BODY_FILE" \
            '{
              text: ("axhub " + $tag + " released — " + $url),
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ("🚀 axhub " + $tag + " 릴리즈"), emoji: true }
                },
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: ("📖 <" + $url + "|GitHub 릴리즈 노트 보기>") }
                  ]
                },
                { type: "divider" },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ("*✨ 이번 릴리즈 요약*\n" + $body)
                  }
                },
                { type: "divider" },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*📦 업데이트 방법*\n• Claude Code 플러그인: `/plugin update axhub@axhub`\n• 강제 재설치 (파일 불일치 시): `/plugin install axhub@axhub --force`"
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "Release notes 열기", emoji: true },
                      url: $url,
                      style: "primary"
                    }
                  ]
                }
              ]
            }')
          curl -fsSL -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" \
            || echo "Slack notification failed (fail-open) — release succeeded"
          rm -f "$BODY_FILE"
